name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install package
        run: pip install -e .
      - name: Smoke test
        run: python -m glossina.cli --help
      - name: Bytecode check
        run: python -m py_compile glossina/*.py
